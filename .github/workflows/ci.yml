name: CI

on:
  push:
  pull_request:

jobs:
  test-postgres:
    name: Test (postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: diesel_schemas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libpq-dev
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/diesel_schemas
        run: cargo test --no-default-features --features "postgres,r2d2,async"

  test-mysql:
    name: Test (mysql)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: diesel_schemas
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libmysqlclient-dev
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev

      - name: Run tests
        env:
          DATABASE_URL: mysql://root:root@127.0.0.1/diesel_schemas
        run: cargo test --no-default-features --features "mysql,r2d2,async"
